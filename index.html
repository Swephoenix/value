<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Creation Canvas - Interactive</title>
    <style>
        :root {
            --bg: #F0F4F8;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --particle-blue: #0EA5E9;
            --particle-red: #EF4444;
            
            --color-origin: #EF4444; 
            --color-goal: #F59E0B;   
            --color-prod: #3B82F6;   
            --color-act: #8B5CF6;    
            --color-dept: #10B981;   
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .canvas-actions {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 50;
            width: 190px;
            padding: 10px;
            border: 1px solid rgba(203, 213, 225, 0.9);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.16);
            backdrop-filter: blur(16px);
            display: grid;
            gap: 8px;
        }

        .canvas-action {
            appearance: none;
            width: 100%;
            border: 1px solid transparent;
            background: rgba(248, 250, 252, 0.92);
            color: var(--text-main);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        .canvas-action::after {
            content: attr(data-icon);
            width: 24px;
            height: 24px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.08);
            color: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            font-size: 0.8rem;
        }

        .canvas-action:hover {
            transform: translateY(-1px);
            border-color: rgba(148, 163, 184, 0.75);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.10);
        }

        .canvas-action.primary {
            background: #0F172A;
            color: #FFFFFF;
            border-color: #0F172A;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.20);
        }

        .canvas-action.primary::after {
            background: rgba(255, 255, 255, 0.16);
        }

        .canvas-action.active {
            background: #ECFEFF;
            color: #155E75;
            border-color: rgba(6, 182, 212, 0.35);
        }

        .canvas-action.active::after {
            background: rgba(6, 182, 212, 0.14);
        }

        .canvas-action-label {
            padding: 6px 2px 0;
            color: var(--text-muted);
            font-size: 0.64rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            .canvas-actions {
                position: sticky;
                top: 12px;
                right: auto;
                width: auto;
                max-width: 520px;
                margin: 0 auto 18px;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .canvas-action-label {
                grid-column: 1 / -1;
            }
        }

        .editor-bar {
            display: none;
        }

        .editor-bar.disabled {
            opacity: 0.7;
        }

        .tool-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tool-button {
            appearance: none;
            border: 1px solid #CBD5E1;
            background: #FFFFFF;
            color: var(--text-main);
            border-radius: 999px;
            padding: 10px 14px;
            font: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        }

        .tool-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .tool-button.primary {
            background: #0F172A;
            color: #FFFFFF;
            border-color: #0F172A;
        }

        .tool-button.active {
            background: #EEF2FF;
            border-color: #6366F1;
            color: #4338CA;
        }

        .tool-button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .editor-fields {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .editor-fields input,
        .editor-fields select {
            border: 1px solid #CBD5E1;
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
            font-size: 0.85rem;
            background: #FFFFFF;
            color: var(--text-main);
        }

        .editor-note {
            grid-column: 1 / -1;
            margin-top: 4px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .editor-status {
            justify-self: end;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: right;
        }

        .canvas-container {
            position: relative;
            max-width: 1250px; /* Utökad bredd */
            margin: 0 auto;
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 15px 30px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .link-ui-layer {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
        }

        .link-delete-btn {
            position: absolute;
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.92);
            color: #fff;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.22);
        }

        .link-delete-btn:hover {
            background: #EF4444;
        }

        .node-menu {
            position: absolute;
            z-index: 20;
            min-width: 180px;
            padding: 8px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(226, 232, 240, 0.96);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(10px);
            display: none;
        }

        .node-menu.open {
            display: block;
        }

        .node-menu button {
            width: 100%;
            appearance: none;
            border: 0;
            background: transparent;
            color: var(--text-main);
            padding: 10px 12px;
            border-radius: 10px;
            text-align: left;
            font: inherit;
            font-size: 0.84rem;
            cursor: pointer;
        }

        .node-menu button:hover {
            background: #EFF6FF;
            color: #1D4ED8;
        }

        .node-menu .menu-danger:hover {
            background: #FEF2F2;
            color: #B91C1C;
        }

        .preview-path {
            stroke: var(--particle-blue);
            stroke-width: 3;
            fill: none;
            stroke-dasharray: 8 6;
            filter: url(#glowBlue);
            pointer-events: none;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .row-label {
            grid-column: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            text-align: right;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-right: 1px solid #E2E8F0;
            box-sizing: border-box;
            padding-right: 20px;
            padding-top: 25px;
            padding-bottom: 25px;
            transform: translateY(22px);
        }

        .row-label.label-act {
            padding-top: 62px;
            padding-bottom: 12px;
        }

        .row-label span.sub-label {
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: none;
            margin-top: 4px;
            color: #94A3B8;
        }

        .row-content {
            grid-column: 2;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 25px 0;
            z-index: 2;
            gap: 20px;
        }

        .row-content.activities-row {
            min-height: 220px;
            align-items: flex-start;
            position: relative;
            padding-top: 62px;
            padding-bottom: 12px;
        }

        .row-content.organisation-row {
            min-height: 120px;
            align-items: center;
            padding-top: 10px;
            padding-bottom: 10px;
            transform: translateY(22px);
        }

        .card {
            background: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            min-width: 150px;
            border: 1px solid #F1F5F9;
            position: relative;
            transition: box-shadow 0.2s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            touch-action: none;
        }

        .card.physics-dragging,
        .card.physics-returning {
            transition: box-shadow 0.2s ease, opacity 0.3s ease;
            cursor: grabbing;
            z-index: 6;
        }

        .card.goal {
            border-left: 4px solid var(--color-goal);
            cursor: pointer;
        }

        .card.goal:hover {
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .card.goal.disabled {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .card.selected {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18), 0 12px 24px rgba(15, 23, 42, 0.14);
            border-color: rgba(59, 130, 246, 0.45);
        }

        .card.link-source {
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18), 0 12px 24px rgba(15, 23, 42, 0.14);
            border-color: rgba(245, 158, 11, 0.5);
        }

        .card.editable {
            cursor: text;
            padding-right: 34px;
        }

        .card.activity-node {
            position: relative;
            align-self: flex-start;
        }

        .card.person-node {
            min-width: 128px;
            min-height: 150px;
            padding-top: 92px;
            padding-bottom: 16px;
            border-radius: 24px;
            background:
                radial-gradient(circle at 50% 18px, rgba(14, 165, 233, 0.14), transparent 42%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.96)),
                url('person.svg') center 16px / 72px 72px no-repeat;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        .card.person-node .delete-node-btn {
            top: 8px;
            right: 8px;
        }

        .card.person-node .connect-handle {
            top: 10px;
        }

        .card.person-node .height-handle {
            display: none;
        }

        .card.editing {
            outline: 2px dashed rgba(59, 130, 246, 0.5);
            outline-offset: 2px;
        }

        .card.dragging {
            opacity: 0.45;
        }

        .card.connecting {
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.18), 0 12px 24px rgba(15, 23, 42, 0.14);
            border-color: rgba(14, 165, 233, 0.5);
        }

        .card.connect-target {
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18), 0 12px 24px rgba(15, 23, 42, 0.14);
            border-color: rgba(245, 158, 11, 0.5);
        }

        .card .connect-handle {
            position: absolute;
            left: 50%;
            top: -7px;
            transform: translate(-50%, 0);
            width: 14px;
            height: 14px;
            border: 2px solid #FFFFFF;
            border-radius: 999px;
            background: var(--particle-blue);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.18);
            cursor: crosshair;
            opacity: 0;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .card.editable:hover .connect-handle,
        .card.connecting .connect-handle {
            opacity: 1;
        }

        .card .height-handle {
            position: absolute;
            left: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border: none;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.12);
            color: #334155;
            font-size: 12px;
            line-height: 1;
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s ease, background 0.15s ease;
        }

        .card.activity-node:hover .height-handle {
            opacity: 1;
        }

        .card .height-handle:hover {
            background: rgba(15, 23, 42, 0.18);
        }

        .card .delete-node-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 20px;
            height: 20px;
            padding: 0;
            border: none;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.86);
            color: #fff;
            font-size: 13px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.18);
        }

        .card .delete-node-btn:hover {
            background: #EF4444;
        }

        .card small {
            display: block;
            font-weight: 400;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card .node-label {
            display: block;
        }

        .card.activity-node .node-label {
            font-weight: 700;
        }

        .card.origin { border-left: 4px solid var(--color-origin); background: #FEF2F2; }
        .card.prod { border-left: 4px solid var(--color-prod); }
        .card.act { border-left: 4px solid var(--color-act); }
        .card.dept { border-left: 4px solid var(--color-dept); }
        .card.ind { border-radius: 30px; background: #F8FAFC; border: 1px solid #E2E8F0; }

        .card.ind.person-node {
            min-width: 88px;
            min-height: 108px;
            padding: 12px 6px 6px;
            border: none;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            text-align: center;
            color: var(--text-main);
            font-size: 0.82rem;
            font-weight: 700;
            line-height: 1.15;
        }

        .card.ind.person-node::before {
            content: '';
            width: 58px;
            height: 58px;
            flex: 0 0 auto;
            background: url('person.svg') center center / contain no-repeat;
            opacity: 0.96;
        }

        .card.act,
        .card.dept {
            cursor: pointer;
        }

        .card.has-people {
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.12), 0 12px 24px rgba(15, 23, 42, 0.12);
        }

        .activity-popover {
            position: absolute;
            z-index: 18;
            min-width: 240px;
            max-width: 320px;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, 0.96);
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 20px 44px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(10px);
            display: none;
        }

        .activity-popover.open {
            display: block;
        }

        .activity-popover h3 {
            margin: 0 0 6px;
            font-size: 0.92rem;
            line-height: 1.2;
        }

        .activity-popover .popover-subtitle {
            margin: 0 0 12px;
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .activity-popover .people-list {
            display: grid;
            gap: 8px;
        }

        .activity-popover .person-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 12px;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
        }

        .activity-popover .person-row img {
            width: 24px;
            height: 24px;
            flex: 0 0 auto;
        }

        .activity-popover .person-row strong {
            font-size: 0.84rem;
        }

        .activity-popover .person-row span {
            display: block;
            color: var(--text-muted);
            font-size: 0.72rem;
            margin-top: 1px;
        }

        .activity-popover .empty-state {
            color: var(--text-muted);
            font-size: 0.84rem;
            padding: 4px 0 2px;
        }

        #act-buy { top: 30px; }
        #act-cook { top: 0px; }
        #act-serve { top: -30px; }
    </style>
</head>
<body>

    <div class="canvas-actions" aria-label="Canvas actions">
        <button class="canvas-action primary" id="create-new-btn" type="button" data-icon="+">Create new</button>
        <button class="canvas-action mode-toggle" id="toggle-edit-btn" type="button" data-icon="E">Edit mode</button>
        <div class="canvas-action-label">Templates</div>
        <button class="canvas-action template-switch" id="restaurant-template-btn" type="button" data-icon="R">Restaurang</button>
        <button class="canvas-action template-switch party-template" id="party-template-btn" type="button" data-icon="P">Politiskt parti</button>
    </div>

        <div class="header">
            <h1>Value Creation Canvas</h1>
            <p>Klicka på ett mål för att avaktivera/aktivera trädet.</p>
        </div>

    <div class="canvas-container" id="canvas">
        <svg id="svg-layer">
            <defs>
                <filter id="glowBlue"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <filter id="glowRed"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <marker id="arrowGrey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#CBD5E1"></path>
                </marker>
                <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#0EA5E9"></path>
                </marker>
            </defs>
            <g id="svg-content"></g>
        </svg>
        <div class="link-ui-layer" id="link-ui-layer"></div>
        <div class="node-menu" id="node-menu"></div>
        <div class="activity-popover" id="activity-popover"></div>

        <div class="row-label label-origin">Ursprung & Behov</div>
        <div class="row-content" id="row-origin" data-row="origin"></div>

        <div class="row-label label-goal">
            Kundens Mål
            <span class="sub-label">vad är det kunden söker för avkastning om denne skulle betala</span>
        </div>
        <div class="row-content" id="row-goal" data-row="goal"></div>

        <div class="row-label label-prod">Lösning</div>
        <div class="row-content" id="row-prod" data-row="prod"></div>

        <div class="row-label label-act">Aktiviteter</div>
        <div class="row-content activities-row" id="row-act" data-row="act"></div>

        <div class="row-label label-dept">Organisation</div>
        <div class="row-content organisation-row" id="row-dept" data-row="dept"></div>

    </div>

    <script>
        const STORAGE_KEY = 'value-canvas-editor-state-v1';
        const ROW_ORDER = ['origin', 'goal', 'prod', 'act', 'dept', 'ind'];

        const defaultState = {
            nodes: [
                { id: 'root-hunger', label: 'Lågt blodsocker', row: 'origin', kind: 'box', order: 0 },
                { id: 'root-social', label: 'Behov av tillhörighet', row: 'origin', kind: 'box', order: 1 },
                { id: 'goal-food', label: 'Stilla hunger', row: 'goal', kind: 'box', order: 0 },
                { id: 'goal-feel', label: 'Känna sig uppskattad', row: 'goal', kind: 'box', order: 1 },
                { id: 'prod-burger', label: 'Vällagad Hamburgare', row: 'prod', kind: 'box', order: 0 },
                { id: 'prod-service', label: 'Varmt bemötande', row: 'prod', kind: 'box', order: 1 },
                { id: 'act-buy', label: 'Inköp', row: 'act', kind: 'box', order: 0, activityOffset: 30 },
                { id: 'act-cook', label: 'Tillagning', row: 'act', kind: 'box', order: 1, activityOffset: 0 },
                { id: 'act-serve', label: 'Servering', row: 'act', kind: 'box', order: 2, activityOffset: -30 },
                { id: 'dept-kitchen', label: 'Köksgruppen', row: 'dept', kind: 'box', order: 0 },
                { id: 'dept-service', label: 'Servicegruppen', row: 'dept', kind: 'box', order: 1 },
            { id: 'ind-anna', label: 'Anna', row: 'ind', kind: 'person', order: 0 },
            { id: 'ind-bo', label: 'Bo', row: 'ind', kind: 'person', order: 1 },
            { id: 'ind-clara', label: 'Clara', row: 'ind', kind: 'person', order: 2 },
            { id: 'ind-david', label: 'David', row: 'ind', kind: 'person', order: 3 }
        ],
            links: [
                { id: 'link-ind-anna-dept-kitchen', from: 'ind-anna', to: 'dept-kitchen' },
                { id: 'link-ind-bo-dept-kitchen', from: 'ind-bo', to: 'dept-kitchen' },
                { id: 'link-ind-clara-dept-service', from: 'ind-clara', to: 'dept-service' },
                { id: 'link-ind-david-dept-service', from: 'ind-david', to: 'dept-service' },
                { id: 'link-dept-kitchen-act-cook', from: 'dept-kitchen', to: 'act-cook' },
                { id: 'link-dept-kitchen-act-buy', from: 'dept-kitchen', to: 'act-buy' },
                { id: 'link-dept-service-act-serve', from: 'dept-service', to: 'act-serve' },
                { id: 'link-act-cook-prod-burger', from: 'act-cook', to: 'prod-burger' },

        function getPhysicsState(nodeId) {
            if (!physicsOffsets.has(nodeId)) {
                physicsOffsets.set(nodeId, { x: 0, y: 0, vx: 0, vy: 0, dragging: false, frame: null });
            }
            return physicsOffsets.get(nodeId);
        }

        function applyNodeVisualTransform(nodeId) {
            const el = getNodeElement(nodeId);
            if (!el) return;

            const physics = getPhysicsState(nodeId);
            const scale = goalScales[nodeId] || 1;
            const translate = `translate(${physics.x}px, ${physics.y}px)`;
            const scaled = scale !== 1 ? ` scale(${scale})` : '';
            el.style.transform = `${translate}${scaled}`;
        }

        function stopPhysicsAnimation(nodeId) {
            const physics = getPhysicsState(nodeId);
            if (physics.frame) {
                cancelAnimationFrame(physics.frame);
                physics.frame = null;
            }
        }

        function springNodeBack(nodeId) {
            const physics = getPhysicsState(nodeId);
            const el = getNodeElement(nodeId);
            if (el) {
                el.classList.remove('physics-dragging');
                el.classList.add('physics-returning');
            }

            const step = () => {
                physics.vx += -physics.x * 0.16;
                physics.vy += -physics.y * 0.16;
                physics.vx *= 0.74;
                physics.vy *= 0.74;
                physics.x += physics.vx;
                physics.y += physics.vy;

                if (Math.abs(physics.x) < 0.35 && Math.abs(physics.y) < 0.35 && Math.abs(physics.vx) < 0.35 && Math.abs(physics.vy) < 0.35) {
                    physics.x = 0;
                    physics.y = 0;
                    physics.vx = 0;
                    physics.vy = 0;
                    physics.frame = null;
                    applyNodeVisualTransform(nodeId);
                    const returnedEl = getNodeElement(nodeId);
                    if (returnedEl) returnedEl.classList.remove('physics-returning');
                    scheduleDraw();
                    return;
                }

                applyNodeVisualTransform(nodeId);
                scheduleDraw();
                physics.frame = requestAnimationFrame(step);
            };

            stopPhysicsAnimation(nodeId);
            physics.frame = requestAnimationFrame(step);
        }

        function slugify(text) {
            return text
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function createUniqueId(row, label) {
            const base = slugify(label) || 'ny';
            let candidate = `${row}-${base}`;
            let suffix = 2;
            while (nodeById.has(candidate)) {
                candidate = `${row}-${base}-${suffix++}`;
            }
            return candidate;
        }

        function sortNodesForRow(row) {
            return state.nodes
                .filter(node => node.row === row)
                .slice()
                .sort((a, b) => (a.order ?? 0) - (b.order ?? 0) || a.label.localeCompare(b.label, 'sv'));
        }

        function getActivityOffset(node) {

        function getActivityPeople(activityId) {
            const directPersonIds = state.links
                .filter(link => link.to === activityId && nodeById.get(link.from)?.row === 'ind')
                .map(link => link.from);
            const deptIds = state.links
                .filter(link => link.to === activityId && nodeById.get(link.from)?.row === 'dept')
                .map(link => link.from);
            const viaDeptIds = state.links
                .filter(link => deptIds.includes(link.to) && nodeById.get(link.from)?.row === 'ind')
                .map(link => link.from);

            const assignedIds = state.activityAssignments?.[activityId];
            const fallbackIds = [...directPersonIds, ...viaDeptIds];
            const ids = Array.isArray(assignedIds) && assignedIds.length ? assignedIds : fallbackIds;

            return [...new Set(ids)]
                .map(id => nodeById.get(id))
                .filter(node => node && node.row === 'ind');
        }

        function getDepartmentPeople(departmentId) {
            return state.links
                .filter(link => link.to === departmentId && nodeById.get(link.from)?.row === 'ind')
                .map(link => nodeById.get(link.from))
                .filter(node => node && node.row === 'ind');
        }

        function getInvolvedPeople(nodeId) {
            const node = nodeById.get(nodeId);
            if (!node) return [];
            const people = node.row === 'act'
                ? getActivityPeople(nodeId)
                : node.row === 'dept'
                    ? getDepartmentPeople(nodeId)
                    : [];
            return [...new Map(people.map(person => [person.id, person])).values()];
        }

        function getEnergyFlowFromActivity(flow) {
            const firstActivityIndex = flow.findIndex(id => nodeById.get(id)?.row === 'act');
            return firstActivityIndex >= 0 ? flow.slice(firstActivityIndex) : flow;
        }

        function deriveEnergyFlowsFromLinks() {
            const outgoing = new Map();
            state.links.forEach(link => {
                if (!nodeById.has(link.from) || !nodeById.has(link.to)) return;
                if (!outgoing.has(link.from)) outgoing.set(link.from, []);
                outgoing.get(link.from).push(link.to);
            });

            const flows = [];
            const activityIds = state.nodes.filter(node => node.row === 'act').map(node => node.id);

            const walk = (currentId, path) => {
                const node = nodeById.get(currentId);
                if (!node) return;
                if (node.row === 'goal') {
                    flows.push(path);
                    return;
                }
                if (path.length > 8) return;

                (outgoing.get(currentId) || []).forEach(nextId => {
                    if (path.includes(nextId)) return;
                    const nextNode = nodeById.get(nextId);
                    if (!nextNode || !['prod', 'goal'].includes(nextNode.row)) return;
                    walk(nextId, [...path, nextId]);
                });
            };

            activityIds.forEach(activityId => walk(activityId, [activityId]));
            return flows;
        }

        function getEnergyFlowsForRender() {
            const configuredFlows = state.energyFlows.map(getEnergyFlowFromActivity);
            const derivedFlows = deriveEnergyFlowsFromLinks();
            const unique = new Map();

            [...configuredFlows, ...derivedFlows].forEach(flow => {
                if (flow.length < 2) return;
                const key = flow.join('>');
                if (!unique.has(key)) unique.set(key, flow);
            });

            return [...unique.values()];
        }

        function getNewNodeDefaultsForRow(row) {

                kind: row === 'ind' ? 'person' : 'box',

            };
        }

        function addNodeAtRow(row, label, index = null, kind = null) {
            const trimmed = label.trim();
            if (!trimmed) return null;

            const defaults = getNewNodeDefaultsForRow(row);
            const nodeKind = kind || defaults.kind;
            const id = createUniqueId(row, trimmed);
            const node = {
                id,
                label: trimmed,
                row,
                kind: nodeKind,
                order: 0,
                activityOffset: row === 'act' ? 0 : undefined
            };

            const rowNodes = sortNodesForRow(row).slice();
            const insertAt = index === null ? rowNodes.length : Math.max(0, Math.min(index, rowNodes.length));
            rowNodes.splice(insertAt, 0, node);

            state.nodes = ROW_ORDER.flatMap(currentRow => {
                const nodesForRow = currentRow === row ? rowNodes : sortNodesForRow(currentRow);
                return nodesForRow.map((entry, i) => ({
                    ...entry,
                    row: currentRow,
                    order: i
                }));
            });

            goalScales[id] = 1;
            persistState();
            renderRows();
            scheduleDraw();
            return id;
        }

        function updateActivityOffset(nodeId, offset) {
            const node = nodeById.get(nodeId);
            if (!node || node.row !== 'act') return;

            const nextOffset = Math.max(-120, Math.min(120, Math.round(offset / 5) * 5));
            state.nodes = state.nodes.map(entry => {
                if (entry.id !== nodeId) return entry;
                return { ...entry, activityOffset: nextOffset };
            });

            persistState();
            renderRows();
            scheduleDraw();
        }

        function createLinkPath(fromId, toPoint) {
            const start = getCenter(fromId);
            if (!start) return null;
            const cpY = start.y + (toPoint.y - start.y) / 2;
            return `M${start.x},${start.y} C${start.x},${cpY} ${toPoint.x},${cpY} ${toPoint.x},${toPoint.y}`;
        }

        function updateConnectionTarget(clientX, clientY) {
            if (!activeConnection) return;
            const canvasRect = canvas.getBoundingClientRect();
            activeConnection.point = {
                x: clientX - canvasRect.left,
                y: clientY - canvasRect.top
            };
            scheduleDraw();
        }

        function finishConnection(clientX, clientY) {
            if (!activeConnection) return;

            const previousSource = activeConnection.sourceId;
            const element = document.elementFromPoint(clientX, clientY);
            const targetNode = element ? element.closest?.('[data-node-id]') : null;
            const targetId = targetNode?.dataset?.nodeId;

            if (targetId && targetId !== previousSource) {
                addLink(previousSource, targetId);
            }

            activeConnection = null;
            renderRows();
            scheduleDraw();
        }

        function isTypingContext(target) {
            return !!target && (
                target.tagName === 'INPUT' ||
                target.tagName === 'TEXTAREA' ||
                target.isContentEditable
            );
        }

        function getCenter(id) {
            const el = getNodeElement(id);
            if (!el) return null;
            const r = el.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();
            return {
                x: r.left - canvasRect.left + r.width / 2,
                y: r.top - canvasRect.top + r.height / 2
            };
        }

        function createPathString(flowArray) {
            const points = flowArray.map(getCenter);
            if (points.some(point => !point)) return null;
            let d = `M${points[0].x},${points[0].y}`;
            for (let j = 0; j < points.length - 1; j++) {
                const p1 = points[j];
                const p2 = points[j + 1];
                const deltaX = p2.x - p1.x;
                const curve = Math.max(36, Math.min(110, Math.abs(deltaX) * 0.28));
                const direction = deltaX >= 0 ? 1 : -1;
                const cp1x = p1.x + curve * direction;
                const cp2x = p2.x - curve * direction;
                const cpY = p1.y + (p2.y - p1.y) / 2;
                d += ` C${cp1x},${cpY} ${cp2x},${cpY} ${p2.x},${p2.y}`;
            }
            return d;
        }

        function triggerGoalInteraction(goalId, effect) {
            if (disabledGoals.has(goalId)) return;
            let current = goalScales[goalId] || 1;
            current = effect === 'demand' ? Math.min(1.35, current + 0.1) : Math.max(0.85, current - 0.1);
            goalScales[goalId] = current;
            applyNodeVisualTransform(goalId);
        }

            toggleEditBtn.classList.toggle('active', editMode);
        }

        function renderRows() {
            rebuildLookup();

            ROW_ORDER.forEach(row => {
                const container = getRowContainer(row);
                if (!container) return;
                container.innerHTML = '';
                sortNodesForRow(row).forEach(node => {
                    container.appendChild(createNodeElement(node));
                });
            });

            renderLinkControls();
            renderActivityPopover();

            updateToolbarState();
        }

        function createNodeElement(node) {
            const el = document.createElement('div');
            el.className = `card ${node.row}`;
            if (node.kind === 'person') {
                el.classList.add('person-node');
            }
            el.dataset.nodeId = node.id;
            el.dataset.row = node.row;
            el.draggable = editMode;
            el.title = editMode ? 'Dubbelklicka för att redigera' : el.title;

            const label = document.createElement('span');
            label.className = 'node-label';
            label.textContent = node.label;
            el.appendChild(label);

            if (node.row === 'act') {
                el.classList.add('activity-node');
                el.style.top = `${getActivityOffset(node)}px`;
            }

            if (node.row === 'goal' && disabledGoals.has(node.id) && !editMode) {
                el.classList.add('disabled');
            }

            if (selectedNodeId === node.id) {
                el.classList.add('selected');
            }

            if (['act', 'dept'].includes(node.row) && activeActivityId === node.id) {
                el.classList.add('has-people');
            }

            if (linkSourceId === node.id) {
                el.classList.add('link-source');
            }

            applyNodeVisualTransform(node.id);

            if (editMode) {
                el.classList.add('editable');
                el.addEventListener('click', handleEditNodeClick);
                el.addEventListener('dblclick', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    selectNode(node.id);
                    startInlineEditById(node.id);
                });
                el.addEventListener('contextmenu', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    selectNode(node.id);
                    openNodeMenu(node.id, event.clientX, event.clientY);
                });
                el.addEventListener('dragstart', handleNodeDragStart);
                el.addEventListener('dragend', handleNodeDragEnd);
                el.addEventListener('dragover', handleNodeDragOver);
                const deleteBtn = document.createElement('button');
                deleteBtn.type = 'button';
                deleteBtn.className = 'delete-node-btn';
                deleteBtn.textContent = '×';
                deleteBtn.title = 'Ta bort nod';
                deleteBtn.addEventListener('click', (event) => {
                    event.stopPropagation();
                    selectedNodeId = node.id;
                    selectedLinkId = null;
                    deleteSelected();
                });
                el.appendChild(deleteBtn);

                const connectHandle = document.createElement('button');
                connectHandle.type = 'button';
                connectHandle.className = 'connect-handle';
                connectHandle.title = 'Dra från ovansidan för att skapa ny linje';
                connectHandle.addEventListener('pointerdown', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    startConnection(node.id, event);
                });
                el.appendChild(connectHandle);

                if (node.row === 'act') {
                    const heightHandle = document.createElement('button');
                    heightHandle.type = 'button';
                    heightHandle.className = 'height-handle';
                    heightHandle.title = 'Dra upp eller ner för att ändra höjd';
                    heightHandle.textContent = '↕';
                    heightHandle.addEventListener('pointerdown', (event) => {
                        event.preventDefault();
                        event.stopPropagation();
                        startActivityAdjust(node.id, event);
                    });
                    el.appendChild(heightHandle);
                }
            } else if (node.row === 'goal') {
                el.addEventListener('pointerdown', (event) => startPhysicsDrag(node.id, event));
                el.addEventListener('click', () => {
                    if (suppressNextNodeClick) return;
                    toggleGoal(node.id);
                });
            } else if (node.row === 'act' || node.row === 'dept') {
                el.addEventListener('pointerdown', (event) => startPhysicsDrag(node.id, event));
                el.addEventListener('click', () => {
                    if (suppressNextNodeClick) return;
                    openActivityPopover(node.id);
                });
            } else {
                el.addEventListener('pointerdown', (event) => startPhysicsDrag(node.id, event));
            }

            return el;
        }

        function renderLinkControls() {
            linkUiLayer.innerHTML = '';
            if (!editMode) return;
            state.links.forEach(link => {
                const from = getCenter(link.from);
                const to = getCenter(link.to);
                if (!from || !to) return;

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'link-delete-btn';
                button.textContent = '×';
                button.title = `Ta bort länk ${nodeById.get(link.from)?.label || link.from} → ${nodeById.get(link.to)?.label || link.to}`;
                button.style.left = `${(from.x + to.x) / 2}px`;
                button.style.top = `${(from.y + to.y) / 2}px`;
                button.addEventListener('click', (event) => {
                    event.stopPropagation();
                    removeLinkById(link.id);
                });
                linkUiLayer.appendChild(button);
            });
        }

        function handleCanvasContextMenu(event) {
            if (!editMode) return;
            if (!event.target.closest('.card')) {
                closeNodeMenu();
            }
        }

        function startPhysicsDrag(nodeId, event) {
            if (editMode || event.button !== 0) return;
            const node = nodeById.get(nodeId);
            if (!node || node.row === 'ind') return;

            const physics = getPhysicsState(nodeId);
            stopPhysicsAnimation(nodeId);
            physics.dragging = true;
            physics.vx = 0;
            physics.vy = 0;

            const startX = event.clientX;
            const startY = event.clientY;
            const originX = physics.x;
            const originY = physics.y;
            let moved = false;
            let lastX = event.clientX;
            let lastY = event.clientY;
            let lastTime = performance.now();

            const el = getNodeElement(nodeId);
            if (el) {
                el.classList.remove('physics-returning');
                el.classList.add('physics-dragging');
            }

            const onMove = (moveEvent) => {
                const dx = moveEvent.clientX - startX;
                const dy = moveEvent.clientY - startY;
                if (!moved && Math.hypot(dx, dy) < 4) return;

                moved = true;
                moveEvent.preventDefault();

                const now = performance.now();
                const dt = Math.max(16, now - lastTime);
                physics.x = originX + dx;
                physics.y = originY + dy;
                physics.vx = (moveEvent.clientX - lastX) / dt * 16;
                physics.vy = (moveEvent.clientY - lastY) / dt * 16;
                lastX = moveEvent.clientX;
                lastY = moveEvent.clientY;
                lastTime = now;

                applyNodeVisualTransform(nodeId);
                scheduleDraw();
            };

            const onUp = () => {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                document.removeEventListener('pointercancel', onCancel);
                physics.dragging = false;

                if (moved) {
                    suppressNextNodeClick = true;
                    setTimeout(() => {
                        suppressNextNodeClick = false;
                    }, 0);
                }

                springNodeBack(nodeId);
            };

            const onCancel = () => {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                document.removeEventListener('pointercancel', onCancel);
                physics.dragging = false;
                springNodeBack(nodeId);
            };

            document.addEventListener('pointermove', onMove, { passive: false });
            document.addEventListener('pointerup', onUp);
            document.addEventListener('pointercancel', onCancel);
        }

        function startActivityAdjust(nodeId, event) {
            if (!editMode) return;
            const node = nodeById.get(nodeId);
            if (!node || node.row !== 'act') return;

            activityAdjust = {
                nodeId,
                startY: event.clientY,
                startOffset: getActivityOffset(node)
            };
            selectedNodeId = nodeId;
            selectedLinkId = null;
            closeNodeMenu();
            renderRows();
            scheduleDraw();

            const onMove = (moveEvent) => {
                if (!activityAdjust) return;
                const delta = moveEvent.clientY - activityAdjust.startY;
                updateActivityOffset(nodeId, activityAdjust.startOffset + delta);
            };

            const onUp = () => {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                document.removeEventListener('pointercancel', onCancel);
                activityAdjust = null;
                renderRows();
                scheduleDraw();
            };

            const onCancel = () => {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                document.removeEventListener('pointercancel', onCancel);
                activityAdjust = null;
                renderRows();
                scheduleDraw();
            };

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
            document.addEventListener('pointercancel', onCancel);
        }

        function startConnection(sourceId, event) {
            activeConnection = {
                sourceId,
                point: { x: event.clientX - canvas.getBoundingClientRect().left, y: event.clientY - canvas.getBoundingClientRect().top }
            };
            selectedNodeId = sourceId;
            selectedLinkId = null;
            renderRows();
            scheduleDraw();

            const onMove = (moveEvent) => updateConnectionTarget(moveEvent.clientX, moveEvent.clientY);
            const onUp = (upEvent) => {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                document.removeEventListener('pointercancel', onCancel);
                finishConnection(upEvent.clientX, upEvent.clientY);
            };
            const onCancel = () => {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                document.removeEventListener('pointercancel', onCancel);
                activeConnection = null;
                renderRows();
                scheduleDraw();
            };

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
            document.addEventListener('pointercancel', onCancel);
        }

        function toggleGoal(goalId) {
            if (editMode) return;
            if (disabledGoals.has(goalId)) {
                disabledGoals.delete(goalId);
            } else {
                disabledGoals.add(goalId);
                goalScales[goalId] = 1;
            }
            persistState();
            renderRows();
            scheduleDraw();
        }

        function selectNode(nodeId) {
            selectedNodeId = nodeId;
            selectedLinkId = null;
            const node = nodeById.get(nodeId);
            if (!node || !['act', 'dept'].includes(node.row)) {
                closeActivityPopover();
            }
            renderRows();
            scheduleDraw();
        }

        function selectLink(linkId) {
            selectedLinkId = linkId;
            selectedNodeId = null;
            renderRows();
            scheduleDraw();
        }

        function clearSelection() {
            selectedNodeId = null;
            selectedLinkId = null;
            linkSourceId = null;
            activeEditNodeId = null;
            activeConnection = null;
            activityAdjust = null;
            closeActivityPopover();
            renderRows();
            scheduleDraw();
        }

        function handleEditNodeClick(event) {
            event.stopPropagation();
            const nodeId = event.currentTarget.dataset.nodeId;
            if (linkMode) {
                if (!linkSourceId) {
                    linkSourceId = nodeId;
                    selectedNodeId = nodeId;
                } else if (linkSourceId === nodeId) {
                    linkSourceId = null;
                } else {
                    addLink(linkSourceId, nodeId);
                    linkSourceId = null;
                    selectedNodeId = null;
                }
                selectedLinkId = null;
                renderRows();
                scheduleDraw();
                return;
            }
            const node = nodeById.get(nodeId);
            selectNode(nodeId);
            if (node && ['act', 'dept'].includes(node.row)) {
                openActivityPopover(nodeId);
            }
        }

        function startInlineEdit(eventOrNodeId) {
            if (!editMode) return;

            const nodeId = typeof eventOrNodeId === 'string'
                ? eventOrNodeId
                : eventOrNodeId.currentTarget.dataset.nodeId;
            const el = getNodeElement(nodeId);
            if (!el) return;
            const labelEl = el.querySelector('.node-label') || el;

            if (eventOrNodeId && typeof eventOrNodeId !== 'string') {
                eventOrNodeId.preventDefault();
                eventOrNodeId.stopPropagation();
            }

            const node = nodeById.get(nodeId);
            if (!node) return;

            const previousLabel = node.label;
            activeEditNodeId = nodeId;
            el.classList.add('editing');
            labelEl.contentEditable = 'true';
            labelEl.focus();

            const range = document.createRange();
            range.selectNodeContents(labelEl);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            const commit = () => {
                labelEl.removeEventListener('blur', commit);
                labelEl.removeEventListener('keydown', onKeyDown);
                labelEl.contentEditable = 'false';
                el.classList.remove('editing');
                activeEditNodeId = null;

                const nextLabel = labelEl.textContent.trim() || previousLabel;
                updateNodeLabel(nodeId, nextLabel);
            };

            const onKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    labelEl.blur();
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    labelEl.textContent = previousLabel;
                    labelEl.blur();
                }
            };

            labelEl.addEventListener('blur', commit);
            labelEl.addEventListener('keydown', onKeyDown);
        }

        function startInlineEditById(nodeId) {
            startInlineEdit(nodeId);
        }

        function updateNodeLabel(nodeId, label) {
            state.nodes = state.nodes.map(node => node.id === nodeId ? { ...node, label } : node);
            persistState();
            renderRows();
            scheduleDraw();
        }

        function duplicateNode(nodeId) {
            const node = nodeById.get(nodeId);
            if (!node) return;
            const rowNodes = sortNodesForRow(node.row);
            const index = Math.max(0, rowNodes.findIndex(entry => entry.id === nodeId) + 1);
            const copyLabel = `${node.label} kopia`;
            const newId = addNodeAtRow(node.row, copyLabel, index, node.kind);
            if (newId) {
                selectNode(newId);
            }
        }

        function beginConnectionFromNode(nodeId) {
            if (!editMode) return;
            linkMode = true;
            linkSourceId = nodeId;
            selectedNodeId = nodeId;
            selectedLinkId = null;
            closeNodeMenu();
            renderRows();
            scheduleDraw();
        }

        function handleRowDoubleClick(event) {
            if (!editMode) return;
            if (event.target.closest('.card')) return;
            closeNodeMenu();

            const row = event.currentTarget.dataset.row;
            const label = window.prompt('Namn på ny nod');
            if (!label) return;

            const insertIndex = getInsertIndexForRow(row, event.clientX);
            const kind = row === 'ind' ? 'person' : 'box';
            const id = addNodeAtRow(row, label, insertIndex, kind);
            if (id) {
                selectNode(id);
                startInlineEditById(id);
            }
        }

        function nextOrderForRow(row) {
            const existing = state.nodes.filter(node => node.row === row);
            return existing.length ? Math.max(...existing.map(node => node.order ?? 0)) + 1 : 0;
        }

        function addNode() {
            if (!editMode) return;
            if (!newNodeLabel || !newNodeKind || !newNodeRow) return;

            const label = newNodeLabel.value.trim();
            if (!label) return;

            const kind = newNodeKind.value;
            const row = kind === 'person' ? 'ind' : newNodeRow.value;
            const id = addNodeAtRow(row, label, null, kind);
            newNodeLabel.value = '';
            if (id) {
                closeNodeMenu();
                selectNode(id);
            }
        }

        function addLink(from, to) {
            if (!from || !to || from === to) return;
            const exists = state.links.some(link => link.from === from && link.to === to);
            if (exists) return;

            const id = `link-${from}-${to}-${state.links.length + 1}`;
            state.links.push({ id, from, to });
            persistState();
            renderRows();
            scheduleDraw();
        }

        function removeLinkById(linkId) {
            state.links = state.links.filter(link => link.id !== linkId);
            if (selectedLinkId === linkId) {
                selectedLinkId = null;
            }
            persistState();
            renderRows();
            scheduleDraw();
        }

        function getInsertIndexForRow(row, dropX, excludeId) {
            const nodes = sortNodesForRow(row).filter(node => node.id !== excludeId);
            if (!nodes.length) return 0;

            for (let i = 0; i < nodes.length; i++) {
                const rect = getNodeRect(nodes[i].id);
                if (!rect) continue;
                const midpoint = rect.left + rect.width / 2;
                if (dropX < midpoint) {
                    return i;
                }
            }

            return nodes.length;
        }

        function moveNodeToRow(nodeId, row, order) {
            const node = nodeById.get(nodeId);
            if (!node) return;

            const otherNodes = state.nodes.filter(existing => existing.id !== nodeId);
            const grouped = new Map();

            ROW_ORDER.forEach(currentRow => {
                grouped.set(
                    currentRow,
                    otherNodes
                        .filter(existing => existing.row === currentRow)
                        .sort((a, b) => (a.order ?? 0) - (b.order ?? 0) || a.label.localeCompare(b.label, 'sv'))
                );
            });

            const targetList = grouped.get(row) || [];
            targetList.splice(Math.max(0, Math.min(order, targetList.length)), 0, { ...node, row });
            grouped.set(row, targetList);

            state.nodes = ROW_ORDER.flatMap(currentRow =>
                (grouped.get(currentRow) || []).map((entry, index) => ({
                    ...entry,
                    row: currentRow,
                    order: index
                }))
            );

            persistState();
            renderRows();
            scheduleDraw();
        }

        function handleNodeDragStart(event) {
            if (!editMode) {
                event.preventDefault();
                return;
            }

            draggedNodeId = event.currentTarget.dataset.nodeId;
            dragOrigin = {
                row: event.currentTarget.dataset.row,
                x: event.clientX,
                y: event.clientY
            };
            event.currentTarget.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', draggedNodeId);
        }

        function handleNodeDragEnd(event) {
            event.currentTarget.classList.remove('dragging');
            draggedNodeId = null;
            dragOrigin = null;
        }

        function handleNodeDragOver(event) {
            if (!editMode || !draggedNodeId) return;
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
        }

        function handleRowDragOver(event) {
            if (!editMode || !draggedNodeId) return;
            event.preventDefault();
        }

        function handleRowDrop(event) {
            if (!editMode || !draggedNodeId) return;
            event.preventDefault();
            const row = event.currentTarget.dataset.row;
            const insertIndex = getInsertIndexForRow(row, event.clientX, draggedNodeId);
            moveNodeToRow(draggedNodeId, row, insertIndex);
            draggedNodeId = null;
            dragOrigin = null;
        }

        function deleteSelected() {
            if (!editMode) return;
            closeNodeMenu();
            activityAdjust = null;

            if (selectedLinkId) {
                state.links = state.links.filter(link => link.id !== selectedLinkId);
                selectedLinkId = null;
            } else if (selectedNodeId) {
                state.nodes = state.nodes.filter(node => node.id !== selectedNodeId);
                state.links = state.links.filter(link => link.from !== selectedNodeId && link.to !== selectedNodeId);
                state.energyFlows = state.energyFlows.filter(flow => !flow.includes(selectedNodeId));
                state.demandFlows = state.demandFlows.filter(flow => !flow.includes(selectedNodeId));
                disabledGoals.delete(selectedNodeId);
                delete goalScales[selectedNodeId];
                selectedNodeId = null;
                linkSourceId = null;
            }

            persistState();
            renderRows();
            scheduleDraw();
        }

        function toggleEditMode() {
            editMode = !editMode;
            linkMode = false;
            linkSourceId = null;
            selectedNodeId = null;
            selectedLinkId = null;
            activeEditNodeId = null;
            closeActivityPopover();
            activeConnection = null;
            activityAdjust = null;
            closeNodeMenu();
            const active = document.activeElement;
            if (active && typeof active.blur === 'function') {
                active.blur();
            }
            renderRows();
            scheduleDraw();
        }

        function toggleLinkMode() {
            if (!editMode) return;
            linkMode = !linkMode;
            linkSourceId = null;
            selectedNodeId = null;
            selectedLinkId = null;
            activeConnection = null;
            activityAdjust = null;
            closeActivityPopover();
            closeNodeMenu();
            renderRows();
            scheduleDraw();
        }

        function syncRowSelection() {
            if (!newNodeRow || !newNodeKind) return;
            newNodeRow.disabled = !editMode || newNodeKind.value === 'person';
            if (newNodeKind.value === 'person') {
                newNodeRow.value = 'ind';
            }
            updateToolbarState();
        }

        function scheduleDraw() {
            if (drawQueued) return;
            drawQueued = true;
            requestAnimationFrame(() => {
                drawQueued = false;
                drawCanvas();
            });
        }

        function drawCanvas() {
            svgLayer.innerHTML = '';

            const staticLinks = state.links.filter(link => nodeById.has(link.from) && nodeById.has(link.to));
            const showFlows = !editMode && !(activeEditNodeId || activeConnection || activityAdjust);

            staticLinks.forEach(link => {
                const pathStr = createPathString([link.from, link.to]);
                if (!pathStr) return;

                const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                hitPath.setAttribute('d', pathStr);
                hitPath.setAttribute('fill', 'none');
                hitPath.setAttribute('stroke', 'rgba(148, 163, 184, 0.01)');
                hitPath.setAttribute('stroke-width', '16');
                hitPath.setAttribute('pointer-events', 'stroke');
                hitPath.style.cursor = editMode ? 'pointer' : 'default';
                hitPath.addEventListener('click', (event) => {
                    if (!editMode) return;
                    event.stopPropagation();
                    selectLink(link.id);
                });
                svgLayer.appendChild(hitPath);

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathStr);
                path.setAttribute('stroke', selectedLinkId === link.id ? '#0F172A' : '#E2E8F0');
                path.setAttribute('stroke-width', selectedLinkId === link.id ? '4' : '2');
                path.setAttribute('fill', 'none');
                path.setAttribute('pointer-events', 'none');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                path.setAttribute('marker-end', 'url(#arrowGrey)');
                svgLayer.appendChild(path);
            });

            if (showFlows) {
                const activeEnergy = getEnergyFlowsForRender()
                    .filter(flow => flow.length > 1 && !disabledGoals.has(flow[flow.length - 1]));
                const activeDemand = state.demandFlows.filter(flow => !disabledGoals.has(flow[flow.length - 1]));

                activeEnergy.forEach(flow => {
                    const pathStr = createPathString(flow);
                    const target = flow[flow.length - 1];
                    if (!pathStr) return;

                    for (let p = 0; p < 2; p++) {
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('r', '3.5');
                        circle.setAttribute('fill', 'var(--particle-blue)');
                        circle.setAttribute('filter', 'url(#glowBlue)');
                        const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
                        anim.setAttribute('dur', (4 + Math.random() * 3) + 's');
                        anim.setAttribute('path', pathStr);
                        anim.setAttribute('begin', (Math.random() * -10) + 's');
                        anim.setAttribute('repeatCount', 'indefinite');
                        anim.addEventListener('repeatEvent', () => triggerGoalInteraction(target, 'supply'));
                        circle.appendChild(anim);
                        svgLayer.appendChild(circle);
                    }
                });

                activeDemand.forEach(flow => {
                    const pathStr = createPathString(flow);
                    const target = flow[flow.length - 1];
                    if (!pathStr) return;

                    for (let p = 0; p < 2; p++) {
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('r', '4');
                        circle.setAttribute('fill', 'var(--particle-red)');
                        circle.setAttribute('filter', 'url(#glowRed)');
                        const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
                        anim.setAttribute('dur', (5 + Math.random() * 4) + 's');
                        anim.setAttribute('path', pathStr);
                        anim.setAttribute('begin', (Math.random() * -10) + 's');
                        anim.setAttribute('repeatCount', 'indefinite');
                        anim.addEventListener('repeatEvent', () => triggerGoalInteraction(target, 'demand'));
                        circle.appendChild(anim);
                        svgLayer.appendChild(circle);
                    }
                });
            }

            if (activeConnection?.sourceId && activeConnection.point) {
                const preview = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const pathStr = createLinkPath(activeConnection.sourceId, activeConnection.point);
                if (pathStr) {
                    preview.setAttribute('d', pathStr);
                    preview.setAttribute('class', 'preview-path');
                    preview.setAttribute('marker-end', 'url(#arrowBlue)');
                    svgLayer.appendChild(preview);
                }
            }
        }

        if (createNewBtn) createNewBtn.addEventListener('click', createNewCanvas);
        if (toggleEditBtn) toggleEditBtn.addEventListener('click', toggleEditMode);
        if (restaurantTemplateBtn) restaurantTemplateBtn.addEventListener('click', loadRestaurantTemplate);
        if (partyTemplateBtn) partyTemplateBtn.addEventListener('click', loadPartyTemplate);
        if (linkModeBtn) linkModeBtn.addEventListener('click', toggleLinkMode);
        if (deleteSelectedBtn) deleteSelectedBtn.addEventListener('click', deleteSelected);
        if (clearSelectionBtn) clearSelectionBtn.addEventListener('click', clearSelection);
        if (addNodeBtn) addNodeBtn.addEventListener('click', addNode);
        if (newNodeKind) newNodeKind.addEventListener('change', syncRowSelection);
        if (newNodeLabel) newNodeLabel.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                addNode();
            }
        });
        document.getElementById('canvas').addEventListener('click', () => {
            if (!editMode) return;
            closeNodeMenu();
            clearSelection();
        });
        ROW_ORDER.forEach(row => {
            const rowEl = getRowContainer(row);
            if (!rowEl) return;
            rowEl.addEventListener('dragover', handleRowDragOver);
            rowEl.addEventListener('drop', handleRowDrop);
            rowEl.addEventListener('dblclick', handleRowDoubleClick);
        });
        nodeMenu.addEventListener('click', (event) => {
            event.stopPropagation();
        });
        document.addEventListener('click', (event) => {
            if (!event.target.closest('#node-menu')) {
                closeNodeMenu();
            }
            if (!event.target.closest('#activity-popover') && !event.target.closest('.card')) {
                closeActivityPopover();
            }
        });
        document.addEventListener('contextmenu', (event) => {
            if (!event.target.closest('.card')) {
                closeNodeMenu();
            }
        });
        document.addEventListener('keydown', (event) => {
            if (!editMode) return;
            if (isTypingContext(event.target)) return;
            if (event.key === 'Escape') {
                closeNodeMenu();
                clearSelection();
            }
            if (event.key === 'Delete' || event.key === 'Backspace') {
                if (selectedNodeId || selectedLinkId) {
                    event.preventDefault();
                    deleteSelected();
                }
            }
        });
        window.addEventListener('load', () => {
            syncRowSelection();
            renderRows();
            scheduleDraw();
        });
        window.addEventListener('resize', scheduleDraw);
        document.addEventListener('keydown', (event) => {
            if (!activeConnection) return;
            if (event.key === 'Escape') {
                activeConnection = null;
                renderRows();
                scheduleDraw();
            }
        });
    </script>
</body>
</html>
